# .github/workflows/us_close_report.yml
#
# 美股收盘完整报告 — MFTSR Alpha
# （重建版 — 2026-06-25：按用户要求，不再接收Telegram推送，且不再自动定时
#  运行。完全改为手动触发(workflow_dispatch)——你需要看最新Dashboard数据
#  时，自己来 Actions 标签点 Run workflow。
#
#  之前曾设定"每周五自动跑一次"，但实际观察到该workflow在UK 09:41触发，
#  与任何配置的时间都不符，原因不明确。为避免继续产生不可预期的推送，
#  这次彻底移除schedule触发器，只保留手动入口。）
#
# 用途：生成/更新 docs/dashboard_data.json，供网页版查看，不发送任何Telegram消息。

name: 美股收盘报告

on:
  workflow_dispatch:   # 唯一的触发方式：手动点击 Run workflow

permissions:
  contents: write

jobs:
  run-close-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install anthropic yfinance requests numpy pandas

      - name: 运行美股收盘分析（仅生成Dashboard数据，不发送Telegram）
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEND_TELEGRAM: "false"
          # 如需自定义股票池，取消下面这行注释并修改代码列表：
          # WATCHLIST: "NVDA,AAPL,MSFT,META,TSLA"
        run: python us_close_report.py

      - name: 提交 dashboard_data.json 到仓库（供 GitHub Pages 读取）
        run: |
          git config user.name "mftsr-bot"
          git config user.email "actions@github.com"
          git add docs/dashboard_data.json
          git diff --staged --quiet && echo "无变化，跳过提交" || git commit -m "更新Dashboard数据 $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "推送失败，第${i}次重试..."
            sleep 5
          done
