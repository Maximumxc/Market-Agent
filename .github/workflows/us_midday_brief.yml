# .github/workflows/us_midday_brief.yml
#
# 美股简报 — MFTSR Alpha
# （更新 — 2026-07-12：频率改为每周一次，周四，北京时间13:00。
#  北京时间全年无夏令时（固定UTC+8），因此只需一条cron，无需BST/GMT切换。
#
# 频率：每周四一次，北京时间13:00（UTC 05:00）
# 内容：市场总览(VIX/指数)+板块强弱+主题动态(AI/财报/地缘政治)
# +个股技术面(含MA100、顶部/底部形态确认)与新闻（无完整MFTSR评分）
# 已移除SMCI（按用户指示从全部股票池中删除）

name: 美股简报

on:
  schedule:
    # 北京时间13:00 = UTC 05:00，仅周四（cron星期字段：4=周四）
    - cron: '0 5 * * 4'

  workflow_dispatch:

jobs:
  run-midday-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install anthropic yfinance requests numpy pandas

      - name: 运行美股简报（市场总览+板块+主题+个股，含新闻搜索）
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python us_midday_brief.py
