# .github/workflows/us_midday_brief.yml
#
# 美股简报 — MFTSR Alpha
# （重建版 — 2026-06-25：频率改为每周二/四，UK时间16:00。
#  之前观察到实际推送时间偏移到UK 22:21，与配置严重不符，原因不明确，
#  最可能是仓库里旧版workflow文件残留/未生效。这次彻底删除重建，
#  上传后请务必去 Actions 标签确认 cron 显示正确。）
#
# 频率：每周二、四，UK时间16:00
# 内容：市场总览(VIX/指数)+板块强弱+主题动态(AI/财报/地缘政治)
# +个股技术面(含MA100、顶部/底部形态确认)与新闻（无完整MFTSR评分）
# 已移除SMCI（按用户指示从全部股票池中删除）

name: 美股简报

on:
  schedule:
    # ── BST 夏令时版本（3月最后周日 ~ 10月最后周日适用）──────────────
    # UK 16:00 BST = 15:00 UTC，仅周二/四（cron星期字段：2=周二,4=周四）
    - cron: '0 15 * * 2,4'

    # ── GMT 冬令时版本（10月最后周日 ~ 3月最后周日适用）──────────────
    # 切换时注释掉上面一行，取消下面这行注释：
    # UK 16:00 GMT = 16:00 UTC
    # - cron: '0 16 * * 2,4'

  workflow_dispatch:

jobs:
  run-midday-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install anthropic yfinance requests numpy pandas

      - name: 运行美股简报（市场总览+板块+主题+个股，含新闻搜索）
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python us_midday_brief.py
