# .github/workflows/a_share_report.yml
#
# A股早报 — MFTSR Alpha
# 每天一次，UK时间07:00（距A股收盘约1小时），全中文输出
# 同时把真实持仓数据导出为 docs/a_share_data.json，提交回仓库供Dashboard读取

name: A股早报

on:
  schedule:
    # ── BST 夏令时版本 ──────────────────────────────────────────────
    # UK 07:00 BST = 06:00 UTC
    - cron: '0 6 * * 1-5'

    # ── GMT 冬令时版本 ──────────────────────────────────────────────
    # 切换时注释掉上面一行，取消下面这行注释：
    # UK 07:00 GMT = 07:00 UTC
    # - cron: '0 7 * * 1-5'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-a-share-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install anthropic yfinance requests numpy pandas

      - name: 运行A股分析并发送早报
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python a_share_report.py

      - name: 提交 a_share_data.json 到仓库（供 GitHub Pages 读取）
        run: |
          git config user.name "mftsr-bot"
          git config user.email "actions@github.com"
          git add docs/a_share_data.json
          git diff --staged --quiet && echo "无变化，跳过提交" || git commit -m "更新A股Dashboard数据 $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "推送失败，第${i}次重试..."
            sleep 5
          done

