# .github/workflows/a_share_report.yml
#
# A股早报 — MFTSR Alpha
# （更新 — 2026-07-12：频率改为每周一次，周二，北京时间13:00。
#  北京时间全年无夏令时（固定UTC+8），因此只需一条cron，无需BST/GMT切换。
#
# 频率：每周二一次，北京时间13:00（UTC 05:00）

name: A股早报

on:
  schedule:
    # 北京时间13:00 = UTC 05:00，仅周二（cron星期字段：2=周二）
    - cron: '0 5 * * 2'

  workflow_dispatch:   # 随时可手动触发测试

permissions:
  contents: write

jobs:
  run-a-share-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install anthropic yfinance requests numpy pandas

      - name: 运行A股分析并发送早报
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python a_share_report.py

      - name: 提交 a_share_data.json 到仓库（供 GitHub Pages 读取）
        run: |
          git config user.name "mftsr-bot"
          git config user.email "actions@github.com"
          git add docs/a_share_data.json
          git diff --staged --quiet && echo "无变化，跳过提交" || git commit -m "更新A股Dashboard数据 $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "推送失败，第${i}次重试..."
            sleep 5
          done
