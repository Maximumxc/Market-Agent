# .github/workflows/a_share_report.yml
#
# A股早报 — MFTSR Alpha
# （重建版 — 2026-06-25：频率改为每周一/三/五，UK时间07:00。
#  之前观察到实际推送时间偏移到UK 14:41，与配置严重不符，原因不明确，
#  最可能是仓库里旧版workflow文件残留/未生效。这次彻底删除重建，
#  上传后请务必去 Actions 标签确认 cron 显示正确。）
#
# 频率：每周一、三、五，UK时间07:00（距A股15:00收盘约1小时）

name: A股早报

on:
  schedule:
    # ── BST 夏令时版本（3月最后周日 ~ 10月最后周日适用）──────────────
    # UK 07:00 BST = 06:00 UTC，仅周一/三/五（cron星期字段：1=周一,3=周三,5=周五）
    - cron: '0 6 * * 1,3,5'

    # ── GMT 冬令时版本（10月最后周日 ~ 3月最后周日适用）──────────────
    # 切换时注释掉上面一行，取消下面这行注释：
    # UK 07:00 GMT = 07:00 UTC
    # - cron: '0 7 * * 1,3,5'

  workflow_dispatch:   # 随时可手动触发测试

permissions:
  contents: write

jobs:
  run-a-share-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install anthropic yfinance requests numpy pandas

      - name: 运行A股分析并发送早报
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python a_share_report.py

      - name: 提交 a_share_data.json 到仓库（供 GitHub Pages 读取）
        run: |
          git config user.name "mftsr-bot"
          git config user.email "actions@github.com"
          git add docs/a_share_data.json
          git diff --staged --quiet && echo "无变化，跳过提交" || git commit -m "更新A股Dashboard数据 $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "推送失败，第${i}次重试..."
            sleep 5
          done
